name: GuardRail Advanced Security Scan
on: [push, pull_request]

jobs:
  Secret-Scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for Secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: "HEAD"

  SAST-Scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Security Check via Semgrep
        run: |
          pip install semgrep
          semgrep --config=p/security-audit ./
